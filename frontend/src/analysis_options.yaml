# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.

include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # use_null_aware_elements requires Dart 3.x null-aware map entry syntax
    # which conflicts with typed maps (Map<K, V> where V is non-nullable).
    # Disabling to avoid false positives on conditional map entries.
    use_null_aware_elements: false
