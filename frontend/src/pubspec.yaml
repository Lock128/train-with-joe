name: train_with_joe
description: Train with Joe - A fun vocabulary training app for kids
version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # AWS Amplify integration
  amplify_flutter: ^2.6.2
  amplify_auth_cognito: ^2.6.2
  amplify_api: ^2.6.2
  
  # State management and routing
  provider: ^6.1.5
  go_router: ^17.0.0
  
  # Payment integration
  in_app_purchase: ^3.1.13
  in_app_purchase_storekit: ">=0.3.6+7 <0.5.0"
  flutter_stripe: ">=11.2.0 <13.0.0"
  
  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  http: ^1.4.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  universal_io: ^2.2.2
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.6
  build_runner: ^2.4.13
  kiri_check: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo.png
