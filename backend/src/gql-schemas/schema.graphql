# Train with Joe GraphQL Schema
# Provides essential functionality for the Train with Joe vocabulary training app

# ============================================================================
# ENUMS
# ============================================================================

enum SubscriptionStatus @aws_cognito_user_pools {
  ACTIVE
  INACTIVE
  CANCELLED
  PAST_DUE
}

enum VocabularyListStatus @aws_cognito_user_pools {
  PENDING
  COMPLETED
  FAILED
}

enum PaymentProvider @aws_cognito_user_pools {
  STRIPE
  APPLE_APP_STORE
  GOOGLE_PLAY_STORE
}

enum TrainingMode @aws_cognito_user_pools {
  TEXT_INPUT
  MULTIPLE_CHOICE
}

enum TrainingDirection @aws_cognito_user_pools {
  WORD_TO_TRANSLATION
  TRANSLATION_TO_WORD
}

# ============================================================================
# TYPES
# ============================================================================

type User @aws_cognito_user_pools {
  id: ID!
  email: String!
  name: String
  subscriptionStatus: SubscriptionStatus
  subscriptionProvider: PaymentProvider
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Subscription @aws_cognito_user_pools {
  id: ID!
  userId: ID!
  provider: PaymentProvider!
  status: SubscriptionStatus!
  planId: String
  externalId: String
  currentPeriodEnd: AWSDateTime
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type VocabularyWord @aws_cognito_user_pools {
  word: String!
  translation: String
  definition: String!
  partOfSpeech: String
  exampleSentence: String
  difficulty: String
  unit: String
  flagged: Boolean
}

type VocabularyList @aws_cognito_user_pools {
  id: ID!
  userId: ID!
  title: String
  words: [VocabularyWord!]!
  sourceImageKey: String
  sourceLanguage: String
  targetLanguage: String
  status: VocabularyListStatus
  errorMessage: String
  isPublic: Boolean
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type TrainingWord @aws_cognito_user_pools {
  word: String!
  translation: String!
  vocabularyListId: String!
  unit: String
}

type TrainingResult @aws_cognito_user_pools {
  wordIndex: Int!
  word: String!
  expectedAnswer: String!
  userAnswer: String!
  correct: Boolean!
}

type MultipleChoiceOption @aws_cognito_user_pools {
  wordIndex: Int!
  options: [String!]!
}

type TrainingExecution @aws_cognito_user_pools {
  id: ID!
  trainingId: ID!
  userId: ID!
  startedAt: AWSDateTime!
  completedAt: AWSDateTime
  abortedAt: AWSDateTime
  results: [TrainingResult!]!
  multipleChoiceOptions: [MultipleChoiceOption!]
  words: [TrainingWord!]
  correctCount: Int!
  incorrectCount: Int!
}

type Training @aws_cognito_user_pools {
  id: ID!
  userId: ID!
  name: String!
  mode: TrainingMode!
  direction: TrainingDirection!
  vocabularyListIds: [String!]!
  words: [TrainingWord!]!
  isRandomized: Boolean
  randomizedWordCount: Int
  executions: [TrainingExecution!]
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type TrainingWordStatistic @aws_cognito_user_pools {
  word: String!
  translation: String!
  correctCount: Int!
  totalCount: Int!
  accuracyPercentage: Float!
}

type TrainingAccuracyTrend @aws_cognito_user_pools {
  executionId: ID!
  startedAt: AWSDateTime!
  accuracy: Float!
}

type TrainingStatistics @aws_cognito_user_pools {
  overallAccuracy: Float!
  averageTimeSeconds: Float!
  totalExecutions: Int!
  perWordStatistics: [TrainingWordStatistic!]!
  mostMissedWords: [TrainingWordStatistic!]!
  accuracyTrend: [TrainingAccuracyTrend!]!
}

type TrainingDayExecution @aws_cognito_user_pools {
  executionId: ID!
  trainingId: ID!
  trainingName: String!
  startedAt: AWSDateTime!
  completedAt: AWSDateTime
  correctCount: Int!
  incorrectCount: Int!
  durationSeconds: Float
}

type TrainingDayStatistics @aws_cognito_user_pools {
  date: String!
  executions: [TrainingDayExecution!]!
  totalExecutions: Int!
  totalCorrect: Int!
  totalIncorrect: Int!
}

type DailySummary @aws_cognito_user_pools {
  date: String!
  trainingCount: Int!
  totalLearningTimeSeconds: Float!
}

type TrainingOverviewStatistics @aws_cognito_user_pools {
  dailySummaries: [DailySummary!]!
  totalDays: Int!
  totalTrainings: Int!
  totalLearningTimeSeconds: Float!
}

# ============================================================================
# INPUT TYPES
# ============================================================================

input CreateUserInput @aws_cognito_user_pools {
  email: String!
  name: String
}

input UpdateUserInput @aws_cognito_user_pools {
  id: ID!
  name: String
  email: String
}

input CreateSubscriptionInput @aws_cognito_user_pools {
  provider: PaymentProvider!
  planId: String!
}

input CreateStripeCheckoutInput @aws_cognito_user_pools {
  planId: String!
  successUrl: String!
  cancelUrl: String!
}

input ValidateAppStoreReceiptInput @aws_cognito_user_pools {
  receiptData: String!
}

input ValidatePlayStoreReceiptInput @aws_cognito_user_pools {
  purchaseToken: String!
  productId: String!
}

input EnhanceContentInput @aws_cognito_user_pools {
  content: String!
}

input GenerateContentInput @aws_cognito_user_pools {
  prompt: String!
}

input AnalyzeImageVocabularyInput @aws_cognito_user_pools {
  imageS3Keys: [String!]!
  sourceLanguage: String
  targetLanguage: String
}

input RenameVocabularyListInput @aws_cognito_user_pools {
  id: ID!
  title: String!
}

input SetVocabularyListPublicInput @aws_cognito_user_pools {
  id: ID!
  isPublic: Boolean!
}

input VocabularyWordInput @aws_cognito_user_pools {
  word: String!
  translation: String
  definition: String!
  partOfSpeech: String
  exampleSentence: String
  difficulty: String
  unit: String
  flagged: Boolean
}

input FlagWordInput @aws_cognito_user_pools {
  vocabularyListId: ID!
  word: String!
}

input UpdateVocabularyListInput @aws_cognito_user_pools {
  id: ID!
  title: String
  sourceLanguage: String
  targetLanguage: String
  words: [VocabularyWordInput!]
}

input GetImageUploadUrlsInput @aws_cognito_user_pools {
  count: Int!
}

input CreateTrainingInput @aws_cognito_user_pools {
  vocabularyListIds: [String!]!
  mode: TrainingMode!
  direction: TrainingDirection
  name: String
  wordCount: Int
  units: [String!]
  isRandomized: Boolean
  randomizedWordCount: Int
}

input TrainingWordInput @aws_cognito_user_pools {
  word: String!
  translation: String!
  vocabularyListId: String!
  unit: String
}

input UpdateTrainingInput @aws_cognito_user_pools {
  trainingId: ID!
  words: [TrainingWordInput!]
  name: String
}

input SubmitAnswerInput @aws_cognito_user_pools {
  executionId: ID!
  wordIndex: Int!
  answer: String!
}

# ============================================================================
# RESPONSE TYPES
# ============================================================================

type UserResponse @aws_cognito_user_pools {
  success: Boolean!
  user: User
  error: String
}

type SubscriptionResponse @aws_cognito_user_pools {
  success: Boolean!
  subscription: Subscription
  error: String
}

type ContentResponse @aws_cognito_user_pools {
  success: Boolean!
  content: String
  error: String
}

type CheckoutResponse @aws_cognito_user_pools {
  success: Boolean!
  checkoutUrl: String
  sessionId: String
  error: String
}

type VocabularyListResponse @aws_cognito_user_pools {
  success: Boolean!
  vocabularyList: VocabularyList
  error: String
}

type ImageUploadUrl @aws_cognito_user_pools {
  s3Key: String!
  uploadUrl: String!
}

type ImageUploadUrlsResponse @aws_cognito_user_pools {
  success: Boolean!
  uploads: [ImageUploadUrl!]
  error: String
}

type TrainingResponse @aws_cognito_user_pools {
  success: Boolean!
  training: Training
  error: String
}

type TrainingExecutionResponse @aws_cognito_user_pools {
  success: Boolean!
  execution: TrainingExecution
  error: String
}

type SubmitAnswerResponse @aws_cognito_user_pools {
  success: Boolean!
  result: TrainingResult
  completed: Boolean
  execution: TrainingExecution
  error: String
}

type TrainingStatisticsResponse @aws_cognito_user_pools {
  success: Boolean!
  statistics: TrainingStatistics
  error: String
}

type TrainingDayStatisticsResponse @aws_cognito_user_pools {
  success: Boolean!
  dayStatistics: TrainingDayStatistics
  error: String
}

type TrainingOverviewStatisticsResponse @aws_cognito_user_pools {
  success: Boolean!
  statistics: TrainingOverviewStatistics
  error: String
}

# ============================================================================
# APP INFO
# ============================================================================

type AppInfo @aws_cognito_user_pools {
  commitId: String!
  buildNumber: String!
}

# ============================================================================
# QUERIES
# ============================================================================

type Query {
  getUser(id: ID!): User @aws_cognito_user_pools
  getAppInfo: AppInfo @aws_cognito_user_pools
  getSubscriptionStatus: Subscription @aws_cognito_user_pools
  getVocabularyLists: [VocabularyList] @aws_cognito_user_pools
  getVocabularyList(id: ID!): VocabularyList @aws_cognito_user_pools
  getPublicVocabularyLists: [VocabularyList] @aws_cognito_user_pools
  getImageUploadUrls(input: GetImageUploadUrlsInput!): ImageUploadUrlsResponse @aws_cognito_user_pools
  getTraining(trainingId: ID!): TrainingResponse @aws_cognito_user_pools
  getTrainings: [Training] @aws_cognito_user_pools
  getTrainingStatistics(trainingId: ID!, userId: ID): TrainingStatisticsResponse @aws_cognito_user_pools
  getTrainingDayStatistics(date: String!, userId: ID): TrainingDayStatisticsResponse @aws_cognito_user_pools
  getTrainingOverviewStatistics(fromDate: String!, toDate: String!, userId: ID): TrainingOverviewStatisticsResponse @aws_cognito_user_pools
  getUsers: [User] @aws_cognito_user_pools
}

# ============================================================================
# MUTATIONS
# ============================================================================

type Mutation {
  # User operations
  createUser(input: CreateUserInput!): UserResponse @aws_cognito_user_pools
  updateUser(input: UpdateUserInput!): UserResponse @aws_cognito_user_pools
  
  # Subscription operations
  createSubscription(input: CreateSubscriptionInput!): SubscriptionResponse @aws_cognito_user_pools
  createStripeCheckout(input: CreateStripeCheckoutInput!): CheckoutResponse @aws_cognito_user_pools
  cancelSubscription: SubscriptionResponse @aws_cognito_user_pools
  
  # Payment validation operations
  validateAppStoreReceipt(input: ValidateAppStoreReceiptInput!): SubscriptionResponse @aws_cognito_user_pools
  validatePlayStoreReceipt(input: ValidatePlayStoreReceiptInput!): SubscriptionResponse @aws_cognito_user_pools
  
  # Vocabulary operations
  deleteVocabularyList(id: ID!): VocabularyListResponse @aws_cognito_user_pools
  renameVocabularyList(input: RenameVocabularyListInput!): VocabularyListResponse @aws_cognito_user_pools
  setVocabularyListPublic(input: SetVocabularyListPublicInput!): VocabularyListResponse @aws_cognito_user_pools
  updateVocabularyList(input: UpdateVocabularyListInput!): VocabularyListResponse @aws_cognito_user_pools
  flagWord(input: FlagWordInput!): VocabularyListResponse @aws_cognito_user_pools

  # AI operations
  enhanceContent(input: EnhanceContentInput!): ContentResponse @aws_cognito_user_pools
  generateContent(input: GenerateContentInput!): ContentResponse @aws_cognito_user_pools
  analyzeImageVocabulary(input: AnalyzeImageVocabularyInput!): VocabularyListResponse @aws_cognito_user_pools

  # Training operations
  createTraining(input: CreateTrainingInput!): TrainingResponse @aws_cognito_user_pools
  updateTraining(input: UpdateTrainingInput!): TrainingResponse @aws_cognito_user_pools
  deleteTraining(trainingId: ID!): TrainingResponse @aws_cognito_user_pools
  startTraining(trainingId: ID!): TrainingExecutionResponse @aws_cognito_user_pools
  submitAnswer(input: SubmitAnswerInput!): SubmitAnswerResponse @aws_cognito_user_pools
  abortTraining(executionId: ID!): TrainingExecutionResponse @aws_cognito_user_pools
}

# ============================================================================
# SCHEMA DEFINITION
# ============================================================================

schema {
  query: Query
  mutation: Mutation
}
