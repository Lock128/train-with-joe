name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  actions: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
      frontend: ${{ steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
      join_page: ${{ steps.changes.outputs.join_page == 'true' || github.event_name == 'workflow_dispatch' }}
      competitors_page: ${{ steps.changes.outputs.competitors_page == 'true' || github.event_name == 'workflow_dispatch' }}
      profile_cards: ${{ steps.changes.outputs.profile_cards == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
            join_page:
              - 'join_page/**'
              - '.github/workflows/**'
            competitors_page:
              - 'competitors_page/**'
              - '.github/workflows/**'
            profile_cards:
              - 'profile_cards/**'
              - '.github/workflows/**'

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Run linting
        run: npm run lint

      - name: Build AppSync functions
        run: npm run build:appsyncFunctions

      - name: Run tests
        run: npm test

      - name: Upload test coverage
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-deps-${{ hashFiles('frontend/src/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-deps-

      - name: Install dependencies
        working-directory: frontend/src
        run: flutter pub get

      - name: Generate mocks
        working-directory: frontend/src
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze Flutter code
        working-directory: frontend/src
        run: flutter analyze

      - name: Run tests
        working-directory: frontend/src
        run: flutter test

      - name: Upload test coverage
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  join-page-test:
    name: Join Page Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Install join_page dependencies
        working-directory: join_page
        run: npm ci

      - name: Check if tests exist
        id: check-tests
        working-directory: join_page
        run: |
          if find src -name "*.spec.ts" -o -name "*.test.ts" | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "✅ Test files found"
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "⚠️ No test files found"
          fi

      - name: Run join_page tests
        if: steps.check-tests.outputs.has_tests == 'true'
        working-directory: join_page
        run: npm test

      - name: Run build verification (no tests available)
        if: steps.check-tests.outputs.has_tests == 'false'
        working-directory: join_page
        run: |
          echo "⚠️ No tests configured for join_page - running build verification instead"
          npm run build
          echo "✅ Build verification completed successfully"

  deploy:
    name: Deploy to AWS
    needs: [changes, backend-test, frontend-test, join-page-test]
    # changes still needed for conditional deploy steps (frontend/join_page S3 sync, CloudFront invalidation)
    if: |
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') || 
        github.event_name == 'workflow_dispatch'
      ) && 
      always() && 
      (
        needs.backend-test.result == 'success' &&
        needs.frontend-test.result == 'success' &&
        needs.join-page-test.result == 'success'
      )
    runs-on: ubuntu-latest
    outputs:
      deployment_tag: ${{ steps.create-tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Ensure SES identity is verified
        run: bash scripts/ensure-ses-identity.sh sandbox eu-central-1

      - name: Build AppSync functions
        run: npm run build:appsyncFunctions

      - name: Deploy Certificate stack (us-east-1)
        run: npx cdk deploy CertificateStack-sandbox --require-approval never
        env:
          NODE_ENV: sandbox
          CDK_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1

      - name: Get Certificate ARN
        id: cert
        run: |
          CERT_ARN=$(aws cloudformation describe-stacks \
            --stack-name "CertificateStack-sandbox" \
            --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='CertificateArn'].OutputValue" \
            --output text)
          echo "certificate_arn=$CERT_ARN" >> $GITHUB_OUTPUT

      - name: Deploy CDK stacks
        run: npm run deploy
        env:
          NODE_ENV: sandbox
          COMMIT_ID: ${{ github.sha }}
          BUILD_NUMBER: ${{ github.run_number }}
          CERTIFICATE_ARN: ${{ steps.cert.outputs.certificate_arn }}
        timeout-minutes: 60

      - name: Setup Flutter
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Cache Flutter dependencies
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-deps-${{ hashFiles('frontend/src/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-deps-

      - name: Install Flutter dependencies
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: frontend/src
        run: flutter pub get

      - name: Inject Amplify config
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        run: bash scripts/inject-amplify-config.sh sandbox eu-central-1

      - name: Build Flutter web app
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: frontend/src
        run: flutter build web --release --dart-define=COMMIT_ID=${{ github.sha }} --dart-define=GITHUB_RUN_NUMBER=${{ github.run_number }}

      - name: Inject join page config
        if: needs.changes.outputs.join_page == 'true' || github.event_name == 'workflow_dispatch'
        run: bash scripts/inject-join-page-config.sh sandbox eu-central-1

      - name: Build Angular join page
        if: needs.changes.outputs.join_page == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: join_page
        run: |
          npm ci
          npm run build

      - name: Patch robots.txt for non-production
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.join_page == 'true' || github.event_name == 'workflow_dispatch'
        run: bash scripts/patch-robots-for-environment.sh sandbox

      - name: Get CloudFront distribution IDs
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.join_page == 'true' || github.event_name == 'workflow_dispatch'
        id: cf-ids
        run: |
          NAMESPACE="sandbox"
          FRONTEND_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "DistributionStack-${NAMESPACE}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" \
            --output text)
          JOIN_PAGE_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "DistributionStack-${NAMESPACE}" \
            --query "Stacks[0].Outputs[?OutputKey=='JoinPageDistributionId'].OutputValue" \
            --output text)
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "DistributionStack-${NAMESPACE}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          JOIN_PAGE_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "DistributionStack-${NAMESPACE}" \
            --query "Stacks[0].Outputs[?OutputKey=='JoinPageBucketName'].OutputValue" \
            --output text)
          echo "frontend_dist_id=$FRONTEND_DIST_ID" >> $GITHUB_OUTPUT
          echo "join_page_dist_id=$JOIN_PAGE_DIST_ID" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "join_page_bucket=$JOIN_PAGE_BUCKET" >> $GITHUB_OUTPUT

      - name: Deploy frontend to S3
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          aws s3 sync frontend/src/build/web "s3://${{ steps.cf-ids.outputs.frontend_bucket }}" --delete

      - name: Deploy join page to S3
        if: needs.changes.outputs.join_page == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          aws s3 sync join_page/dist/train-with-joe-join/browser "s3://${{ steps.cf-ids.outputs.join_page_bucket }}" --delete

      - name: Invalidate CloudFront caches
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.join_page == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          aws cloudfront create-invalidation --distribution-id "${{ steps.cf-ids.outputs.frontend_dist_id }}" --paths "/*"
          aws cloudfront create-invalidation --distribution-id "${{ steps.cf-ids.outputs.join_page_dist_id }}" --paths "/*"

      - name: Create deployment tag
        id: create-tag
        continue-on-error: true
        run: |
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          TAG="deploy-${TIMESTAMP}-${COMMIT_SHORT}"
          
          echo "Creating deployment tag: $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Automated deployment tag for commit ${{ github.sha }}"
          
          if git push origin "$TAG" 2>&1; then
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "✅ Created deployment tag: $TAG"
          else
            echo "⚠️ Failed to push tag"
            echo "tag=$COMMIT_SHORT" >> $GITHUB_OUTPUT
          fi
        env:
          HUSKY: 0

      - name: Create deployment summary
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployment Tag** | \`${{ steps.create-tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | Sandbox |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | $COMMIT_SHORT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed At** | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Deployed Successfully |" >> $GITHUB_STEP_SUMMARY
